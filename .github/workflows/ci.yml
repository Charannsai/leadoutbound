name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-size: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup Prisma Client
      run: npx prisma generate

    - name: Run Linter
      run: npm run lint
